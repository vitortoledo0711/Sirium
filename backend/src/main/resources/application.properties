# PostgreSQL datasource configuration
# Update these values to match your local database setup
spring.datasource.url=jdbc:postgresql://localhost:5432/sirium
spring.datasource.username=postgres
# Set the correct password for the PostgreSQL user (or leave blank if your local Postgres allows trust auth)
spring.datasource.password=0711
spring.datasource.driver-class-name=org.postgresql.Driver

# Prevent Spring Boot from trying to auto-create/alter schema
spring.jpa.hibernate.ddl-auto=none

# If you want SQL logs during development, uncomment:
# spring.jpa.show-sql=true
